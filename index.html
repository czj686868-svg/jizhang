<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: oklch(0.97 0.008 85);
  --surface: oklch(0.995 0.003 85);
  --surface-hover: oklch(0.98 0.006 85);
  --card: oklch(0.99 0.004 80);
  --text-primary: oklch(0.22 0.02 60);
  --text-secondary: oklch(0.45 0.03 60);
  --text-muted: oklch(0.6 0.02 60);
  --accent: oklch(0.62 0.16 85);
  --accent-deep: oklch(0.5 0.14 80);
  --accent-light: oklch(0.82 0.12 85);
  --danger: oklch(0.55 0.18 20);
  --success: oklch(0.52 0.13 160);
  --border: oklch(0.88 0.015 85);
  --shadow-sm: 0 1px 2px oklch(0.2 0.02 60 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.02 60 / 0.08);
  --shadow-lg: 0 8px 30px oklch(0.2 0.02 60 / 0.12);
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --font-display: 'Playfair Display', 'Noto Sans SC', serif;
  --font-body: 'Noto Sans SC', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', monospace;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app-wrap {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header-brand {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 3vw, 1.7rem);
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}
.header-brand i { font-style: italic; font-weight: 500; }
.btn-icon {
  width: 40px; height: 40px;
  border: none;
  background: var(--surface);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  font-size: 1.1rem;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.btn-icon:hover { background: var(--surface-hover); color: var(--text-primary); transform: scale(1.05); }
.btn-icon:active { transform: scale(0.96); }
.btn-icon svg { width: 18px; height: 18px; }

/* Total Balance Card */
.balance-card {
  background: linear-gradient(145deg, oklch(0.55 0.15 85), oklch(0.48 0.13 80));
  border-radius: var(--radius-xl);
  padding: 28px 24px 24px;
  color: #fff;
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.balance-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
}
.balance-card::after {
  content: '';
  position: absolute;
  bottom: -50px; left: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.balance-label {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 4px;
}
.balance-amount {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 7vw, 3.4rem);
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.1;
  position: relative;
  z-index: 1;
}
.balance-amount .unit {
  font-size: 1.2rem;
  font-weight: 500;
  opacity: 0.8;
  margin-left: 2px;
}

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  text-align: center;
  transition: transform 0.2s ease;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card .stat-value {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.03em;
}
.stat-card.budget .stat-value { color: var(--accent); }
.stat-card.remaining .stat-value { color: var(--success); }
.stat-card.remaining.negative .stat-value { color: var(--danger); }

/* Progress Bar */
.progress-wrap {
  margin-bottom: 24px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow-sm);
}
.progress-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
}
.progress-header .label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.progress-header .value {
  font-size: 0.78rem;
  color: var(--text-muted);
}
.progress-track {
  height: 8px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 10px;
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.progress-fill.over { background: var(--danger); }

/* Add Expense */
.expense-input-area {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.input-group {
  flex: 1;
  display: flex; flex-direction: column;
}
.input-group:last-child { flex: 0 0 auto; }
.input-group label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  font-weight: 500;
}
.input-amount {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-family: var(--font-mono);
  background: var(--surface);
  color: var(--text-primary);
  transition: all 0.2s ease;
  outline: none;
}
.input-amount:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(0.62 0.16 85 / 0.15);
}
.input-note {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  background: var(--surface);
  color: var(--text-primary);
  transition: all 0.2s ease;
  outline: none;
  font-family: var(--font-body);
}
.input-note:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(0.62 0.16 85 / 0.15);
}
.input-note::placeholder { color: var(--text-muted); opacity: 0.6; }

.btn-add {
  padding: 12px 20px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}
.btn-add:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: 0 4px 12px oklch(0.5 0.14 80 / 0.3); }
.btn-add:active { transform: scale(0.97); }

/* Date Filter */
.date-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.date-tabs::-webkit-scrollbar { display: none; }
.date-tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
  font-weight: 500;
  flex-shrink: 0;
}
.date-tab.active {
  background: var(--text-primary);
  color: #fff;
  border-color: var(--text-primary);
}
.date-tab:hover:not(.active) {
  background: var(--surface-hover);
  border-color: var(--accent-light);
}

/* Expense List */
.expense-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.expense-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.expense-item:hover { transform: translateX(3px); box-shadow: var(--shadow-md); }
.expense-amount {
  font-family: var(--font-mono);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--danger);
  min-width: 60px;
  text-align: right;
}
.expense-amount .yen {
  font-size: 0.75rem;
  font-weight: 500;
  margin-right: 1px;
}
.expense-info {
  flex: 1;
  min-width: 0;
}
.expense-note {
  font-size: 0.9rem;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.expense-note.empty { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }
.expense-time {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.expense-delete {
  width: 30px; height: 30px;
  border: none;
  background: transparent;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 0.85rem;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.expense-delete:hover { background: oklch(0.55 0.18 20 / 0.08); color: var(--danger); }
.expense-delete:active { transform: scale(0.9); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.4;
}
.empty-state .empty-text {
  font-size: 0.9rem;
}
.empty-state .empty-sub {
  font-size: 0.75rem;
  margin-top: 4px;
  opacity: 0.6;
}

/* Settings Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.settings-panel {
  background: var(--surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 480px;
  padding: 28px 24px 36px;
  animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  max-height: 85vh;
  overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.settings-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.settings-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
}
.settings-close {
  width: 36px; height: 36px;
  border: none; background: var(--bg);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  color: var(--text-secondary);
  transition: all 0.2s ease;
}
.settings-close:hover { background: var(--border); }
.settings-form { display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.form-input {
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  background: var(--bg);
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s ease;
  font-family: var(--font-body);
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(0.62 0.16 85 / 0.12);
}
.form-hint {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: -2px;
}
.btn-save {
  margin-top: 8px;
  padding: 14px 24px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}
.btn-save:hover { background: var(--accent-deep); }
.btn-save:active { transform: scale(0.98); }

/* Day Summary */
.day-summary {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.day-summary .day-label {
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.day-summary .day-total {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 600;
  color: var(--danger);
}

/* Responsive */
@media (max-width: 380px) {
  .balance-card { padding: 22px 18px; }
  .stats-row { gap: 8px; }
  .stat-card { padding: 12px; }
  .stat-card .stat-value { font-size: 1.3rem; }
  .input-row { flex-direction: column; }
  .input-group:last-child { width: 100%; }
  .btn-add { width: 100%; }
}

/* focus visible */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
</style>
</head>
<body>

<div class="app-wrap">
  <header class="header">
    <div class="header-brand">记<i>.</i>账本</div>
    <button class="btn-icon" onclick="openSettings()" aria-label="设置" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Total Balance -->
  <div class="balance-card">
    <div class="balance-label">总余额</div>
    <div class="balance-amount" id="totalBalance"><span class="unit">¥</span>0</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card budget">
      <div class="stat-value" id="todayBudget">¥30</div>
      <div class="stat-label">今日预算</div>
    </div>
    <div class="stat-card remaining" id="remainCard">
      <div class="stat-value" id="todayRemaining">¥30</div>
      <div class="stat-label">今日剩余</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="label">今日支出进度</span>
      <span class="value" id="progressText">0 / 30</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="expense-input-area">
    <div class="input-row">
      <div class="input-group" style="max-width:130px">
        <label>金额</label>
        <input type="number" class="input-amount" id="amountInput" placeholder="0.00" step="0.01" min="0.01" autofocus>
      </div>
      <div class="input-group">
        <label>备注（可选）</label>
        <input type="text" class="input-note" id="noteInput" placeholder="买了什么…" maxlength="60">
      </div>
      <div class="input-group">
        <label>&nbsp;</label>
        <button class="btn-add" onclick="addExpense()">记一笔</button>
      </div>
    </div>
  </div>

  <!-- Date Tabs -->
  <div class="date-tabs" id="dateTabs"></div>

  <!-- Day Summary -->
  <div id="daySummary"></div>

  <!-- Expense List -->
  <div class="expense-list" id="expenseList"></div>

</div>

<!-- Settings Overlay -->
<div class="overlay" id="settingsOverlay" style="display:none" onclick="closeSettingsOutside(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-handle"></div>
    <div class="settings-header">
      <div class="settings-title">设置</div>
      <button class="settings-close" onclick="closeSettings()">&times;</button>
    </div>
    <div class="settings-form">
      <div class="form-group">
        <label>总钱数</label>
        <input type="number" class="form-input" id="setTotal" placeholder="如 3000" step="0.01" min="0">
        <span class="form-hint">你拥有的总金额</span>
      </div>
      <div class="form-group">
        <label>开始日期</label>
        <input type="date" class="form-input" id="setStartDate">
        <span class="form-hint">从哪天开始记账</span>
      </div>
      <div class="form-group">
        <label>当前剩余金额</label>
        <input type="number" class="form-input" id="setRemaining" placeholder="同总钱数" step="0.01" min="0">
        <span class="form-hint">截至目前还剩多少钱（默认与总钱数相同）</span>
      </div>
      <button class="btn-save" onclick="saveSettings()">保存设置</button>

      <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:16px;">
        <label style="font-size:0.78rem;color:var(--text-secondary);font-weight:500;display:block;margin-bottom:10px;">数据备份</label>
        <div style="display:flex;gap:10px;">
          <button class="btn-backup" onclick="exportData()" style="flex:1;padding:11px 0;border:1.5px solid var(--accent);background:transparent;color:var(--accent);border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s ease;">导出备份</button>
          <button class="btn-backup" onclick="document.getElementById('importFile').click()" style="flex:1;padding:11px 0;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s ease;">导入恢复</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <span class="form-hint" style="display:block;margin-top:6px;">定期导出备份到手机文件，换设备或清缓存后可导入恢复</span>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'budget_app_data';
const DAILY_BUDGET = 30;

// --- Data Model ---
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  return null;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getDefaultData() {
  const today = dateStr(new Date());
  return {
    totalMoney: 3000,
    startDate: today,
    currentRemaining: 3000,
    expenses: []
  };
}

function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayStr() { return dateStr(new Date()); }

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

// --- Core Logic ---
function getDailyCarryOver(data, targetDateStr) {
  const target = parseDate(targetDateStr);
  const start = parseDate(data.startDate);
  let carry = 0;

  // Iterate from start date up to the day before target
  for (let d = new Date(start); d < target; d.setDate(d.getDate() + 1)) {
    const ds = dateStr(d);
    const dayExpenses = data.expenses.filter(e => e.date === ds);
    const daySpent = dayExpenses.reduce((sum, e) => sum + e.amount, 0);
    const dayBudget = DAILY_BUDGET + carry;
    const dayRemain = dayBudget - daySpent;
    carry = Math.max(0, dayRemain);
  }
  return carry;
}

function getTodayBudget(data) {
  return DAILY_BUDGET + getDailyCarryOver(data, todayStr());
}

function getTodaySpent(data) {
  const today = todayStr();
  return data.expenses
    .filter(e => e.date === today)
    .reduce((sum, e) => sum + e.amount, 0);
}

function getTodayRemaining(data) {
  return getTodayBudget(data) - getTodaySpent(data);
}

function getTotalSpent(data) {
  return data.expenses.reduce((sum, e) => sum + e.amount, 0);
}

function getDayExpenses(data, dateStr) {
  return data.expenses.filter(e => e.date === dateStr);
}

function getDayTotal(data, dateStr) {
  return getDayExpenses(data, dateStr).reduce((s, e) => s + e.amount, 0);
}

function getDistinctDates(data) {
  const dates = [...new Set(data.expenses.map(e => e.date))];
  dates.sort((a, b) => b.localeCompare(a));
  return dates;
}

// --- Render ---
function renderAll() {
  const data = loadData() || getDefaultData();
  saveData(data);
  renderBalance(data);
  renderStats(data);
  renderProgress(data);
  renderDateTabs(data);
  renderExpenses(data);
}

function renderBalance(data) {
  const total = data.currentRemaining;
  document.getElementById('totalBalance').innerHTML = `<span class="unit">¥</span>${total.toFixed(2)}`;
}

function renderStats(data) {
  const budget = getTodayBudget(data);
  const remaining = getTodayRemaining(data);
  document.getElementById('todayBudget').textContent = `¥${budget.toFixed(2)}`;
  document.getElementById('todayRemaining').textContent = `¥${remaining.toFixed(2)}`;
  const card = document.getElementById('remainCard');
  card.classList.toggle('negative', remaining < 0);
}

function renderProgress(data) {
  const budget = getTodayBudget(data);
  const spent = getTodaySpent(data);
  const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : (spent > 0 ? 100 : 0);
  document.getElementById('progressText').textContent = `${spent.toFixed(2)} / ${budget.toFixed(2)}`;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('over', spent > budget);
}

function renderDateTabs(data) {
  const dates = getDistinctDates(data);
  const today = todayStr();
  const activeDate = document.querySelector('.date-tab.active')?.dataset.date || today;

  let html = `<button class="date-tab${activeDate === today ? ' active' : ''}" data-date="${today}" onclick="switchDate('${today}')">今天</button>`;
  dates.forEach(d => {
    if (d === today) return;
    html += `<button class="date-tab${activeDate === d ? ' active' : ''}" data-date="${d}" onclick="switchDate('${d}')">${d}</button>`;
  });
  document.getElementById('dateTabs').innerHTML = html;
}

function renderExpenses(data) {
  const activeDate = document.querySelector('.date-tab.active')?.dataset.date || todayStr();
  const dayExpenses = getDayExpenses(data, activeDate);
  const dayTotal = getDayTotal(data, activeDate);

  // Day summary
  const summary = document.getElementById('daySummary');
  if (dayExpenses.length > 0) {
    const budget = activeDate === todayStr() ? getTodayBudget(data) : (DAILY_BUDGET + getDailyCarryOver(data, activeDate));
    summary.innerHTML = `
      <div class="day-summary">
        <span class="day-label">${activeDate} · 当日预算 ¥${budget.toFixed(2)}</span>
        <span class="day-total">支出 ¥${dayTotal.toFixed(2)}</span>
      </div>`;
  } else {
    summary.innerHTML = '';
  }

  // Expense list
  const list = document.getElementById('expenseList');
  if (dayExpenses.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">☕</div>
        <div class="empty-text">这天没有支出记录</div>
        <div class="empty-sub">记一笔，从今天开始掌控收支</div>
      </div>`;
    return;
  }

  list.innerHTML = dayExpenses.map((e, i) => `
    <div class="expense-item" style="animation-delay:${i * 0.04}s">
      <div class="expense-amount"><span class="yen">¥</span>${e.amount.toFixed(2)}</div>
      <div class="expense-info">
        <div class="expense-note${e.note ? '' : ' empty'}">${e.note || '无备注'}</div>
        <div class="expense-time">${e.timestamp || ''}</div>
      </div>
      <button class="expense-delete" onclick="deleteExpense('${e.id}')" title="删除">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  `).join('');
}

function switchDate(date) {
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.date-tab[data-date="${date}"]`);
  if (tab) tab.classList.add('active');
  const data = loadData();
  if (data) {
    renderDateTabs(data);
    renderExpenses(data);
  }
}

// --- Actions ---
function addExpense() {
  const amountInput = document.getElementById('amountInput');
  const noteInput = document.getElementById('noteInput');
  const amount = parseFloat(amountInput.value);
  if (isNaN(amount) || amount <= 0) {
    amountInput.focus();
    amountInput.style.borderColor = 'var(--danger)';
    setTimeout(() => { amountInput.style.borderColor = 'var(--border)'; }, 1200);
    return;
  }

  const data = loadData() || getDefaultData();
  const now = new Date();
  const expense = {
    id: 'exp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    date: dateStr(now),
    amount: Math.round(amount * 100) / 100,
    note: noteInput.value.trim(),
    timestamp: now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  };

  // Update remaining
  data.currentRemaining = Math.max(0, data.currentRemaining - expense.amount);
  data.expenses.push(expense);
  saveData(data);

  amountInput.value = '';
  noteInput.value = '';
  amountInput.focus();

  // Ensure today tab is active
  const today = todayStr();
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  const todayTab = document.querySelector(`.date-tab[data-date="${today}"]`);
  if (todayTab) todayTab.classList.add('active');

  renderAll();
}

function deleteExpense(id) {
  const data = loadData();
  if (!data) return;
  const idx = data.expenses.findIndex(e => e.id === id);
  if (idx === -1) return;

  const removed = data.expenses.splice(idx, 1)[0];
  data.currentRemaining += removed.amount;
  saveData(data);
  renderAll();
}

// --- Settings ---
function openSettings() {
  const data = loadData() || getDefaultData();
  document.getElementById('setTotal').value = data.totalMoney;
  document.getElementById('setStartDate').value = data.startDate;
  document.getElementById('setRemaining').value = data.currentRemaining;
  document.getElementById('settingsOverlay').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay')) {
    closeSettings();
  }
}

function saveSettings() {
  const total = parseFloat(document.getElementById('setTotal').value);
  const startDate = document.getElementById('setStartDate').value;
  const remaining = parseFloat(document.getElementById('setRemaining').value);

  if (isNaN(total) || total < 0) { alert('请输入有效的总钱数'); return; }
  if (!startDate) { alert('请选择开始日期'); return; }
  if (isNaN(remaining) || remaining < 0) { alert('请输入有效的剩余金额'); return; }

  const data = loadData() || getDefaultData();
  data.totalMoney = total;
  data.startDate = startDate;
  data.currentRemaining = remaining;
  saveData(data);
  closeSettings();
  renderAll();
}

// --- Backup ---
function exportData() {
  const data = loadData();
  if (!data) { alert('暂无数据可导出'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `记账本备份_${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (typeof data.totalMoney !== 'number' || !Array.isArray(data.expenses)) {
        throw new Error('格式不正确');
      }
      if (!confirm('导入将覆盖当前所有数据，确定继续？')) return;
      saveData(data);
      closeSettings();
      renderAll();
      alert('数据已成功恢复！');
    } catch(err) {
      alert('文件格式不正确，请选择正确的备份文件');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// --- Keyboard ---
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('amountInput')) {
    document.getElementById('noteInput').focus();
  } else if (e.key === 'Enter' && document.activeElement === document.getElementById('noteInput')) {
    addExpense();
  }

  // Prevent past dates
  const dateInput = document.getElementById('setStartDate');
  if (dateInput) {
    dateInput.max = todayStr();
  }
});

// --- Init ---
renderAll();
</script>
</body>
